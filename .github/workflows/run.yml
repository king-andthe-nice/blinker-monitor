name: 点灯设备监控
on:
  workflow_dispatch:   # 允许手动运行
  schedule:
    - cron: '* * * * *' # 每 1 分钟运行一次（UTC）

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 运行监控脚本
        run: python blinker_monitor.py
